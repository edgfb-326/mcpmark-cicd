name: Pull Request Automation

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  NODE_VERSION: '20'

jobs:
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        id: eslint
        run: |
          set -o pipefail
          npm run lint 2>&1 | tee eslint-output.txt
        continue-on-error: true

      - name: Run Prettier check
        id: prettier
        run: |
          set -o pipefail
          npx prettier --check src/ 2>&1 | tee prettier-output.txt
        continue-on-error: true

      - name: Generate code quality report
        id: quality-report
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let eslintOutput = '';
            let prettierOutput = '';
            try {
              eslintOutput = fs.readFileSync('eslint-output.txt', 'utf8');
            } catch (e) {}
            try {
              prettierOutput = fs.readFileSync('prettier-output.txt', 'utf8');
            } catch (e) {}
            
            const eslintFailed = process.env.ESLINT_EXIT_CODE === '1';
            const prettierFailed = process.env.PRETTIER_EXIT_CODE === '1';
            
            const summary = `### Code Quality Report
**ESLint**: ${eslintFailed ? '❌ Failed' : '✅ Passed'}
**Prettier**: ${prettierFailed ? '❌ Failed' : '✅ Passed'}

<details>
<summary>ESLint Output</summary>

\`\`\`
${eslintOutput.substring(0, 4000)}
\`\`\`
</details>

<details>
<summary>Prettier Output</summary>

\`\`\`
${prettierOutput.substring(0, 4000)}
\`\`\`
</details>`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: summary
            });
        env:
          ESLINT_EXIT_CODE: ${{ steps.eslint.outcome == 'success' && '0' || '1' }}
          PRETTIER_EXIT_CODE: ${{ steps.prettier.outcome == 'success' && '0' || '1' }}

  testing-suite:
    name: Testing Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install jq for coverage parsing
        run: sudo apt-get install -y jq

      - name: Run tests with coverage
        id: test-coverage
        run: npm run test:coverage 2>&1 | tee coverage-output.txt
        continue-on-error: true

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: Generate coverage summary
        id: coverage-summary
        run: |
          if [ -f "coverage/coverage-summary.json" ]; then
            cat coverage/coverage-summary.json | jq -r '.total | "Lines: \(.lines.pct)%\nStatements: \(.statements.pct)%\nFunctions: \(.functions.pct)%\nBranches: \(.branches.pct)%"' > coverage-summary.txt
          else
            echo "No coverage data generated" > coverage-summary.txt
          fi

      - name: Post coverage report
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let coverageText = '';
            try {
              coverageText = fs.readFileSync('coverage-summary.txt', 'utf8');
            } catch (e) {
              coverageText = 'No coverage data available';
            }
            const testFailed = process.env.TEST_EXIT_CODE === '1';
            const summary = `### Test Coverage Report
**Status**: ${testFailed ? '❌ Tests Failed' : '✅ Tests Passed'}

\`\`\`
${coverageText}
\`\`\`

Coverage artifacts uploaded.`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: summary
            });
        env:
          TEST_EXIT_CODE: ${{ steps.test-coverage.outcome == 'success' && '0' || '1' }}

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        id: npm-audit
        run: npm audit --json 2> /dev/null > audit.json || true

      - name: Run Gitleaks (secret detection)
        id: gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          config-path: .gitleaks.toml
          redact: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Generate security report
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let auditData = { vulnerabilities: {} };
            try {
              const auditRaw = fs.readFileSync('audit.json', 'utf8');
              auditData = JSON.parse(auditRaw);
            } catch (e) {}
            
            const vulnCount = auditData.metadata?.vulnerabilities?.total || 0;
            const gitleaksExitCode = process.env.GITLEAKS_EXIT_CODE;
            const hasSecrets = gitleaksExitCode === '1';
            
            const summary = `### Security Scan Report
**Vulnerabilities**: ${vulnCount} found in dependencies
**Secret Detection**: ${hasSecrets ? '❌ Potential secrets found' : '✅ No secrets detected'}

<details>
<summary>Dependency Audit Summary</summary>

Total vulnerabilities: ${vulnCount}
Critical: ${auditData.metadata?.vulnerabilities?.critical || 0}
High: ${auditData.metadata?.vulnerabilities?.high || 0}
Moderate: ${auditData.metadata?.vulnerabilities?.moderate || 0}
Low: ${auditData.metadata?.vulnerabilities?.low || 0}
</details>

*Note: This is an automated security scan. Review findings carefully.*`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: summary
            });
        env:
          GITLEAKS_EXIT_CODE: ${{ steps.gitleaks.outcome == 'success' && '0' || '1' }}

  build-validation:
    name: Build Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Start application in background
        run: |
          npm start &
          echo $! > server.pid
          sleep 5

      - name: Validate endpoints accessibility
        id: health-check
        run: |
          curl -f http://localhost:3000/health && echo "Health check passed" || (echo "Health check failed"; exit 1)

      - name: Stop application
        run: |
          kill $(cat server.pid) 2>/dev/null || true

      - name: Post build validation report
        uses: actions/github-script@v7
        with:
          script: |
            const healthPassed = process.env.HEALTH_EXIT_CODE === '0';
            const summary = `### Build Validation
**Build**: ✅ Successful
**Health Check**: ${healthPassed ? '✅ Passed' : '❌ Failed'}

All endpoints validated and application is ready for deployment.`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: summary
            });
        env:
          HEALTH_EXIT_CODE: ${{ steps.health-check.outcome == 'success' && '0' || '1' }}