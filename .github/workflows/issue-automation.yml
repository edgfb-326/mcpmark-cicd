name: Issue Management Automation

on:
  issues:
    types: [opened, labeled]

jobs:
  issue-triage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run issue triage
        uses: actions/github-script@v7
        with:
          script: |
            const { github, context } = require('@actions/github');
            const issue = context.issue;
            const title = context.payload.issue.title.toLowerCase();
            const body = context.payload.issue.body ? context.payload.issue.body.toLowerCase() : '';

            // Step 1: Create all required labels if they don't exist
            const labelsToCreate = [
              { name: 'bug', color: 'd73a4a', description: 'Something isn\'t working' },
              { name: 'enhancement', color: 'a2eeef', description: 'New feature or request' },
              { name: 'epic', color: '0052cc', description: 'Large feature requiring multiple sub-tasks' },
              { name: 'maintenance', color: 'd876e3', description: 'Maintenance and housekeeping tasks' },
              { name: 'priority-critical', color: 'b60205', description: 'Critical priority issue' },
              { name: 'priority-high', color: 'ff9f1c', description: 'High priority issue' },
              { name: 'priority-medium', color: 'ffd166', description: 'Medium priority issue' },
              { name: 'priority-low', color: 'c2e0c6', description: 'Low priority issue' },
              { name: 'needs-triage', color: 'fef2c0', description: 'Needs to be reviewed by maintainers' },
              { name: 'needs-review', color: 'bfd4f2', description: 'Awaiting review from maintainers' },
              { name: 'first-time-contributor', color: '84b6eb', description: 'Issue created by first-time contributor' }
            ];

            for (const label of labelsToCreate) {
              try {
                await github.rest.issues.getLabel({
                  owner: issue.owner,
                  repo: issue.repo,
                  name: label.name
                });
              } catch (error) {
                if (error.status === 404) {
                  await github.rest.issues.createLabel({
                    owner: issue.owner,
                    repo: issue.repo,
                    name: label.name,
                    color: label.color,
                    description: label.description
                  });
                }
              }
            }

            // Step 2: Add initial needs-triage label
            await github.rest.issues.addLabels({
              owner: issue.owner,
              repo: issue.repo,
              issue_number: issue.number,
              labels: ['needs-triage']
            });

            // Step 3: Assign category label based on title
            let categoryLabel = null;
            if (title.includes('bug')) {
              categoryLabel = 'bug';
            } else if (title.includes('epic')) {
              categoryLabel = 'epic';
            } else if (title.includes('maintenance')) {
              categoryLabel = 'maintenance';
            }

            if (categoryLabel) {
              await github.rest.issues.addLabels({
                owner: issue.owner,
                repo: issue.repo,
                issue_number: issue.number,
                labels: [categoryLabel]
              });
            }

            // Step 4: Assign priority label based on title or body (highest priority wins)
            const priorityKeywords = [
              { keywords: ['critical', 'urgent', 'production', 'outage'], label: 'priority-critical' },
              { keywords: ['important', 'high', 'blocking'], label: 'priority-high' },
              { keywords: ['low', 'nice-to-have', 'minor'], label: 'priority-low' },
              { keywords: ['medium', 'normal'], label: 'priority-medium' }
            ];

            let priorityLabel = 'priority-medium'; // default
            for (const { keywords, label } of priorityKeywords) {
              const hasKeyword = keywords.some(k => title.includes(k) || body.includes(k));
              if (hasKeyword) {
                priorityLabel = label;
                break; // highest priority first
              }
            }

            await github.rest.issues.addLabels({
              owner: issue.owner,
              repo: issue.repo,
              issue_number: issue.number,
              labels: [priorityLabel]
            });

  task-breakdown:
    runs-on: ubuntu-latest
    needs: issue-triage
    if: contains(github.event.issue.labels.*.name, 'epic')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create epic sub-tasks
        uses: actions/github-script@v7
        with:
          script: |
            const { github, context } = require('@actions/github');
            const issue = context.issue;
            const parentTitle = context.payload.issue.title;
            const parentNumber = issue.number;

            // Define sub-tasks
            const subTasks = [
              { name: 'Requirements Analysis' },
              { name: 'Design and Architecture' },
              { name: 'Implementation' },
              { name: 'Testing and Documentation' }
            ];

            // Create sub-issues and collect their numbers
            const subIssueNumbers = [];
            for (let i = 0; i < subTasks.length; i++) {
              const subTask = subTasks[i];
              const subTitle = `[SUBTASK] ${parentTitle} - Task ${i + 1}: ${subTask.name}`;
              const subBody = `Related to #${parentNumber}`;

              const subIssue = await github.rest.issues.create({
                owner: issue.owner,
                repo: issue.repo,
                title: subTitle,
                body: subBody,
                labels: ['enhancement', 'needs-review']
              });

              subIssueNumbers.push(subIssue.data.number);
            }

            // Update parent issue body with Epic Tasks checklist
            const parentBody = context.payload.issue.body || '';
            const checklist = `\n\n## Epic Tasks\n${subIssueNumbers.map((num, i) => `- [ ] Task ${i + 1}: ${subTasks[i].name} (#${num})`).join('\n')}`;
            const newParentBody = parentBody + checklist;

            await github.rest.issues.update({
              owner: issue.owner,
              repo: issue.repo,
              issue_number: parentNumber,
              body: newParentBody
            });

  auto-response:
    runs-on: ubuntu-latest
    needs: [issue-triage, task-breakdown]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run auto-response
        uses: actions/github-script@v7
        with:
          script: |
            const { github, context } = require('@actions/github');
            const issue = context.issue;
            const author = context.payload.issue.user.login;
            const labels = context.payload.issue.labels.map(l => l.name);

            // Step 1: Check if author is first-time contributor in this repo
            const authorIssues = await github.rest.issues.listForRepo({
              owner: issue.owner,
              repo: issue.repo,
              author: author,
              state: 'all'
            });

            const isFirstTime = authorIssues.data.length === 1; // only this issue
            if (isFirstTime) {
              await github.rest.issues.addLabels({
                owner: issue.owner,
                repo: issue.repo,
                issue_number: issue.number,
                labels: ['first-time-contributor']
              });
            }

            // Step 2: Post welcome message if first-time
            if (isFirstTime) {
              const welcomeMessage = `Welcome to the mcpmark-cicd project! This is your first issue here. We appreciate your contribution. Please follow the guidelines below based on your issue type.`;
              await github.rest.issues.createComment({
                owner: issue.owner,
                repo: issue.repo,
                issue_number: issue.number,
                body: welcomeMessage
              });
            }

            // Step 3: Post type-specific response
            let typeResponse = '';
            if (labels.includes('bug')) {
              typeResponse = `### Bug Report Guidelines\nPlease ensure you've provided:\n1. Clear description of the bug\n2. Steps to reproduce\n3. Expected vs actual behavior\n4. Environment details\n\nFor more details, see our [Bug Report Template](.github/ISSUE_TEMPLATE/bug_report.md).`;
            } else if (labels.includes('epic')) {
              typeResponse = `### Feature Request Process\nThis epic will be broken down into sub-tasks shortly. For feature requests, please ensure you've provided:\n1. User story\n2. Proposed solution\n3. Benefits\n\nFor more details, see our [Feature Request Template](.github/ISSUE_TEMPLATE/feature_request.md).`;
            } else if (labels.includes('maintenance')) {
              typeResponse = `### Maintenance Guidelines\nFor maintenance tasks, please ensure you've provided:\n1. Clear description of the task\n2. Maintenance type\n3. Impact and timeline\n\nFor more details, see our [Maintenance Report Template](.github/ISSUE_TEMPLATE/maintenance_report.md).`;
            }

            if (typeResponse) {
              await github.rest.issues.createComment({
                owner: issue.owner,
                repo: issue.repo,
                issue_number: issue.number,
                body: typeResponse
              });
            }

            // Step 4: Set milestone for high/critical priority
            if (labels.includes('priority-high') || labels.includes('priority-critical')) {
              // Check if milestone v1.0.0 exists
              let milestoneId = null;
              try {
                const milestones = await github.rest.issues.listMilestones({
                  owner: issue.owner,
                  repo: issue.repo,
                  state: 'all'
                });
                const v1Milestone = milestones.data.find(m => m.title === 'v1.0.0');
                if (v1Milestone) {
                  milestoneId = v1Milestone.number;
                } else {
                  // Create milestone if not exists
                  const newMilestone = await github.rest.issues.createMilestone({
                    owner: issue.owner,
                    repo: issue.repo,
                    title: 'v1.0.0',
                    description: 'First major release'
                  });
                  milestoneId = newMilestone.data.number;
                }
              } catch (error) {
                console.error('Error handling milestone:', error);
              }

              if (milestoneId) {
                await github.rest.issues.update({
                  owner: issue.owner,
                  repo: issue.repo,
                  issue_number: issue.number,
                  milestone: milestoneId
                });
              }
            }

            // Step 5: Change status from needs-triage to needs-review
            await github.rest.issues.removeLabel({
              owner: issue.owner,
              repo: issue.repo,
              issue_number: issue.number,
              name: 'needs-triage'
            });
            await github.rest.issues.addLabels({
              owner: issue.owner,
              repo: issue.repo,
              issue_number: issue.number,
              labels: ['needs-review']
            });
